<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>เช็คชื่อนักศึกษา</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Sarabun', sans-serif;
      background: #f7f6f3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .wrap {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .logo {
      font-size: 13px;
      font-weight: 500;
      color: #999;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .card {
      width: 100%;
      background: #fff;
      border-radius: 20px;
      padding: 2rem 1.75rem;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    .card h1 {
      font-size: 20px;
      font-weight: 600;
      color: #111;
      margin-bottom: 4px;
    }

    .card .sub {
      font-size: 13px;
      color: #999;
      margin-bottom: 1.75rem;
    }

    label {
      font-size: 12px;
      font-weight: 500;
      color: #555;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 24px;
      font-weight: 500;
      letter-spacing: 6px;
      text-align: center;
      padding: 16px;
      border: 2px solid #e8e8e8;
      border-radius: 12px;
      background: #fafafa;
      color: #111;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    input[type="text"]:focus {
      border-color: #111;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(0,0,0,0.06);
    }
    input[type="text"]::placeholder { color: #ccc; letter-spacing: 4px; }

    .dots-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 12px;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #e0e0e0;
      transition: background 0.15s, transform 0.15s;
    }
    .dot.on { background: #111; transform: scale(1.2); }

    .hint {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      margin-top: 8px;
      min-height: 16px;
      transition: color 0.2s;
    }
    .hint.warn { color: #d97706; }

    .btn {
      width: 100%;
      margin-top: 1.5rem;
      padding: 15px;
      font-family: 'Sarabun', sans-serif;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      border: none;
      background: #111;
      color: #fff;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn:disabled { background: #e0e0e0; color: #bbb; cursor: not-allowed; }
    .btn:not(:disabled):active { transform: scale(0.98); opacity: 0.85; }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* SUCCESS STATE */
    .success-screen {
      display: none;
      text-align: center;
      padding: 1rem 0;
    }
    .success-icon {
      width: 64px; height: 64px;
      background: #f0fdf4;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 28px;
      animation: pop 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    @keyframes pop { 0%{transform:scale(0)} 100%{transform:scale(1)} }
    .success-title { font-size: 18px; font-weight: 600; color: #111; margin-bottom: 4px; }
    .success-id { font-family: 'IBM Plex Mono', monospace; font-size: 15px; color: #555; margin-bottom: 6px; letter-spacing: 2px; }
    .success-count { font-size: 13px; color: #999; }
    .btn-again {
      margin-top: 1.5rem;
      width: 100%;
      padding: 13px;
      font-family: 'Sarabun', sans-serif;
      font-size: 15px;
      font-weight: 500;
      border-radius: 12px;
      border: 2px solid #e8e8e8;
      background: #fff;
      color: #111;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-again:hover { background: #f7f6f3; }

    /* TOAST */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #ef4444; color: #fff;
      font-size: 13px; padding: 10px 20px;
      border-radius: 24px; opacity: 0;
      transition: all 0.3s; z-index: 99;
      white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

<div class="wrap">
  <div class="logo">เช็คชื่อ</div>

  <div class="card">
    <!-- FORM -->
    <div id="formView">
      <h1>สวัสดีครับ!</h1>
      <p class="sub">กรุณากรอกรหัสนักศึกษาเพื่อเช็คชื่อ</p>

      <label for="sid">รหัสนักศึกษา</label>
      <input type="text" id="sid" inputmode="numeric" maxlength="11" placeholder="00000000000" autocomplete="off" />

      <div class="dots-row" id="dots"></div>
      <div class="hint" id="hint">กรุณากรอกตัวเลข 11 หลัก</div>

      <button class="btn" id="submitBtn" disabled>
        <div class="spinner" id="spinner"></div>
        <span id="btnText">เช็คชื่อ</span>
      </button>
    </div>

    <!-- SUCCESS -->
    <div class="success-screen" id="successView">
      <div class="success-icon">✓</div>
      <div class="success-title">เช็คชื่อสำเร็จ!</div>
      <div class="success-id" id="successId"></div>
      <div class="success-count" id="successCount"></div>
      <button class="btn-again" onclick="reset()">เช็คชื่อคนถัดไป</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ===== ตั้งค่า URL ของ Google Apps Script =====
  const API_URL = 'PASTE_YOUR_APPS_SCRIPT_URL_HERE';
  // =============================================

  const sid = document.getElementById('sid');
  const dotsEl = document.getElementById('dots');
  const hint = document.getElementById('hint');
  const submitBtn = document.getElementById('submitBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');

  function renderDots(n) {
    dotsEl.innerHTML = '';
    for (let i = 0; i < 11; i++) {
      const d = document.createElement('div');
      d.className = 'dot' + (i < n ? ' on' : '');
      dotsEl.appendChild(d);
    }
  }
  renderDots(0);

  sid.addEventListener('input', () => {
    const raw = sid.value.replace(/\D/g, '').slice(0, 11);
    sid.value = raw;
    renderDots(raw.length);
    if (raw.length === 0) {
      hint.textContent = 'กรุณากรอกตัวเลข 11 หลัก';
      hint.className = 'hint';
      submitBtn.disabled = true;
    } else if (raw.length < 11) {
      hint.textContent = `ต้องการอีก ${11 - raw.length} หลัก`;
      hint.className = 'hint';
      submitBtn.disabled = true;
    } else {
      hint.textContent = '';
      submitBtn.disabled = false;
    }
  });

  submitBtn.addEventListener('click', async () => {
    const val = sid.value;
    if (val.length !== 11) return;

    const now = new Date();
    const dateStr = now.toLocaleDateString('th-TH', { year: 'numeric', month: '2-digit', day: '2-digit' });
    const timeStr = now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

    setLoading(true);

    let count = 1;
    if (API_URL && !API_URL.includes('PASTE_YOUR')) {
      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId: val, date: dateStr, time: timeStr })
        });
      } catch (e) {
        showToast('ส่งข้อมูลไม่สำเร็จ กรุณาลองใหม่');
        setLoading(false);
        return;
      }
    }

    setLoading(false);
    showSuccess(val, dateStr, timeStr);
  });

  function setLoading(on) {
    submitBtn.disabled = on;
    spinner.style.display = on ? 'block' : 'none';
    btnText.textContent = on ? 'กำลังบันทึก...' : 'เช็คชื่อ';
  }

  function showSuccess(id, date, time) {
    document.getElementById('formView').style.display = 'none';
    const sv = document.getElementById('successView');
    sv.style.display = 'block';
    document.getElementById('successId').textContent = id;
    document.getElementById('successCount').textContent = `${date} · ${time}`;
  }

  function reset() {
    sid.value = '';
    renderDots(0);
    hint.textContent = 'กรุณากรอกตัวเลข 11 หลัก';
    hint.className = 'hint';
    submitBtn.disabled = true;
    document.getElementById('formView').style.display = 'block';
    document.getElementById('successView').style.display = 'none';
    setTimeout(() => sid.focus(), 100);
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
